<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEL 社會情緒學習活動</title>
    <style>
        /* 整體排版 */
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            line-height: 1.6; 
            color: #333; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #f0f2f5; 
        }

        /* 標頭區塊與跳動動畫 */
        header { 
            background: linear-gradient(135deg, #6c5ce7, #a29bfe); 
            color: white; 
            padding: 40px 20px; 
            text-align: center; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        h1 {
            display: inline-block;
            animation: bounce 2s infinite; /* 這裡就是跳動效果 */
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* 內容區塊 */
        .section { 
            background: white; 
            padding: 30px; 
            margin-top: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            transition: transform 0.3s ease; 
        }

        .section:hover { 
            transform: translateY(-5px); 
        }

        h2 { 
            color: #6c5ce7; 
            border-left: 5px solid #6c5ce7; 
            padding-left: 15px; 
        }

        /* 按鈕樣式 */
        .btn { 
            display: inline-block; 
            background: #6c5ce7; 
            color: white; 
            padding: 12px 25px; 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: bold; 
            margin-top: 15px; 
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        .btn:hover { 
            background: #5649c0; 
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <h1>🌟 探索內心力量</h1>
        <p>SEL 社會情緒學習：認識自己，連結他人</p>
    </header>

    <div class="section">
        <h2>🌈 活動目標</h2>
        <p>透過「自我覺察」與「負責任的決定」，幫助我們在壓力大時找到平靜，並與朋友建立更深層的連結。</p>
    </div>

    <div class="section">
        <h2>⛈️ 今日挑戰：情緒天氣預報</h2>
        <p>閉上眼睛 30 秒，感受你現在的情緒。是晴天、午後雷陣雨，還是微風徐徐的陰天？</p>
        <button class="btn" onclick="showSurprise()">點我記錄今日心情</button>
    </div>

    <script>
        // 這段 JavaScript 負責處理按鈕點擊後的反應
        function showSurprise() {
            alert("太棒了！記錄心情是自我覺察的第一步。無論今天是什麼天氣，都給努力的自己一個抱抱吧！🫂");
        }
    </script>

</body>
</html>
